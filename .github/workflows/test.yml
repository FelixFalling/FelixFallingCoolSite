# Runs the Playwright test suite on every push and pull request.
#
# This is separate from the deploy workflow (static.yml) on purpose: deploys
# stay simple and never get blocked by a flaky test, while this workflow gives
# you a green check / red X on every commit and PR. If you later want failing
# tests to BLOCK deploys, the cleanest way is branch protection on main
# requiring this check to pass.
name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch: # the "Run workflow" button in the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Playwright config uses channel "chrome" - GitHub's runners already
      # have Chrome installed, so there's no browser download step.
      - name: Run Playwright tests
        run: npm test

      # When a test fails, the HTML report (screenshots, traces, every step) is
      # saved as a downloadable artifact on the run page - open it locally with
      # `npx playwright show-report <unzipped folder>`.
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
